<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DAEMON AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://js.puter.com/v2/"></script>
<style>
:root {
  --neon-green: #00ff9d;
  --neon-pink: #ff00ff;
  --neon-cyan: #00ffff;
  --neon-yellow: #ffe600;
  --dark-bg: #000000;
  --surface: #0a0a0a;
  --border: rgba(0,255,157,0.2);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

body {
  font-family: 'Courier New', monospace;
  background: var(--dark-bg);
  color: var(--neon-green);
  height: 100vh; height: 100dvh;
  overflow: hidden;
  position: fixed; width: 100%;
}

/* SCANLINES */
body::before {
  content:""; position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events:none; z-index:9999;
  animation: scanmove 10s linear infinite;
}
@keyframes scanmove { from{background-position:0 0} to{background-position:0 100%} }

/* ── TABS ── */
.tab-bar {
  display: flex;
  background: #000;
  border-bottom: 2px solid var(--neon-green);
  z-index: 200; position: relative;
}
.tab-btn {
  flex: 1; padding: 10px 4px;
  font-family: 'Courier New', monospace;
  font-size: 0.7em; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px;
  background: transparent;
  border: none; border-bottom: none;
  color: rgba(0,255,157,0.4);
  cursor: pointer; min-height: 44px;
  transition: all 0.2s;
}
.tab-btn.active {
  color: var(--neon-green);
  background: rgba(0,255,157,0.08);
  border-bottom: 3px solid var(--neon-green);
  box-shadow: 0 0 15px rgba(0,255,157,0.2);
}
.tab-btn:active { background: rgba(0,255,157,0.15); }

/* ── SCREENS ── */
.screen { display:none; height:calc(100dvh - 44px); overflow:hidden; flex-direction:column; }
.screen.active { display:flex; }

/* ══════════════════════════════════
   DAEMON SCREEN
══════════════════════════════════ */
.daemon-header {
  background: linear-gradient(90deg, rgba(0,255,157,0.08), rgba(255,0,255,0.08));
  border-bottom: 1px solid var(--neon-green);
  padding: 10px 15px;
  padding-top: calc(10px + env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 0 20px rgba(0,255,157,0.2);
  flex-shrink: 0;
}
.glitch-text {
  font-size: 1.1em; font-weight: bold; text-transform: uppercase;
  text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-cyan);
  animation: glitch 3s infinite;
}
@keyframes glitch {
  0%,100% { text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-cyan); }
  25% { text-shadow: -0.05em -0.025em 0 var(--neon-pink), 0.025em 0.025em 0 var(--neon-cyan); }
  50% { text-shadow: 0.025em 0.05em 0 var(--neon-pink), -0.05em -0.05em 0 var(--neon-cyan); }
}
.live-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent2,#ff3d71);
  animation: pulsedot 1.4s infinite;
  display:inline-block; margin-right:6px;
}
@keyframes pulsedot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

.sensor-bar {
  background: rgba(0,0,0,0.95);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px;
  display: flex; gap: 6px; overflow-x: auto;
  font-size: 0.7em; white-space: nowrap;
  scrollbar-width: none; flex-shrink: 0;
}
.sensor-bar::-webkit-scrollbar { display:none; }
.chip {
  background: rgba(0,30,20,0.8);
  border: 1px solid var(--neon-green);
  padding: 5px 10px; border-radius: 20px;
  font-size: 0.85em;
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0; transition: all 0.3s;
}
.chip.active { background: var(--neon-green); color:#000; box-shadow:0 0 8px var(--neon-green); font-weight:bold; }
.chip.error { background:#ff0040; border-color:#ff0040; color:#fff; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* VIDEO PREVIEW */
.video-wrapper {
  position: absolute;
  top: 130px; right: 10px;
  width: 130px; height: 97px;
  border: 2px solid var(--neon-pink);
  border-radius: 8px; overflow: hidden;
  z-index: 90; background: #000;
  box-shadow: 0 0 15px rgba(255,0,255,0.4);
  display: none;
}
.video-wrapper::after {
  content:"REC"; position:absolute; top:4px; left:4px;
  background:red; color:#fff; padding:1px 5px;
  font-size:0.6em; border-radius:3px; font-weight:bold;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }

/* ACTIVATION */
.activation-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.97);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 1000; gap: 16px; padding: 20px;
}
.activation-box {
  background: linear-gradient(135deg, rgba(255,0,255,0.08), rgba(0,255,157,0.08));
  border: 2px solid var(--neon-pink);
  padding: 28px 20px; border-radius: 16px;
  text-align: center; width: 100%; max-width: 380px;
  box-shadow: 0 0 40px rgba(255,0,255,0.25);
}
.activate-btn {
  background: transparent; border: 2px solid var(--neon-green);
  color: var(--neon-green); padding: 16px 32px;
  font-size: 1em; font-family: inherit; cursor: pointer;
  text-transform: uppercase; letter-spacing: 2px;
  transition: all 0.3s; margin-top: 18px; width: 100%;
  font-weight: bold; border-radius: 8px; min-height: 52px;
}
.activate-btn:active { background:var(--neon-green); color:#000; box-shadow:0 0 25px var(--neon-green); }
.activate-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* CHAT */
.chat-container {
  flex: 1; overflow-y: auto; padding: 12px;
  padding-bottom: 8px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  position: relative;
}
.message {
  margin: 10px 0; padding: 11px 13px; border-radius: 8px;
  max-width: 88%; position: relative;
  animation: fadeIn 0.3s ease-in; line-height: 1.5;
  font-size: 0.9em; word-wrap: break-word;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.message.user { background:rgba(0,50,40,0.6); margin-left:auto; border-left:3px solid var(--neon-green); text-align:right; }
.message.assistant { background:rgba(40,0,40,0.6); border-right:3px solid var(--neon-pink); }
.message-header { font-size:0.65em; opacity:0.6; margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; font-weight:bold; }
.message.assistant .message-header { color:var(--neon-pink); }
.message.user .message-header { color:var(--neon-green); }

/* THINKING */
.thinking { display:flex; gap:4px; align-items:center; color:var(--neon-pink); font-style:italic; font-size:0.85em; }
.dot { width:7px; height:7px; background:var(--neon-pink); border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1){animation-delay:-0.32s} .dot:nth-child(2){animation-delay:-0.16s}
@keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

/* STATUS */
.status-line {
  padding: 5px 12px; background: rgba(0,0,0,0.95);
  font-size: 0.65em; color: var(--neon-cyan);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between;
  font-family: monospace; flex-shrink: 0;
}

/* INPUT */
.input-area {
  background: rgba(5,5,5,0.98);
  border-top: 2px solid var(--neon-green);
  padding: 8px 10px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  display: flex; gap: 6px; align-items: flex-end;
  flex-shrink: 0; backdrop-filter: blur(10px);
}
textarea {
  flex:1; background:rgba(0,20,10,0.8); border:1px solid var(--neon-green);
  color:var(--neon-green); padding:10px 12px; font-family:inherit;
  font-size:16px; border-radius:8px; resize:none; outline:none;
  min-height:46px; max-height:110px; line-height:1.4;
}
textarea::placeholder { color:rgba(0,255,157,0.3); }
button {
  background:rgba(0,255,157,0.15); border:2px solid var(--neon-green);
  color:var(--neon-green); padding:10px 14px; font-family:inherit;
  cursor:pointer; border-radius:8px; text-transform:uppercase;
  font-weight:bold; transition:all 0.2s; min-height:46px; font-size:0.85em;
}
button:active { transform:scale(0.95); background:var(--neon-green); color:#000; }
button:disabled { opacity:0.35; cursor:not-allowed; }
.voice-btn { background:rgba(255,0,255,0.15); border-color:var(--neon-pink); color:var(--neon-pink); padding:10px; font-size:1.1em; }
.voice-btn.muted { opacity:0.4; }
.clear-btn { background:rgba(255,0,40,0.15); border-color:#ff0040; color:#ff0040; padding:10px; }

/* ══════════════════════════════════
   NEURAL PRESS SCREEN
══════════════════════════════════ */
.np-screen {
  background: #050507; color: #e8e8f0;
  font-family: 'DM Sans', 'Courier New', sans-serif;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}

.np-ticker {
  background: #00e5ff; overflow: hidden;
  height: 30px; display: flex; align-items: center; flex-shrink: 0;
}
.np-ticker-label {
  background:#000; color:#00e5ff;
  font-size:10px; font-weight:bold; letter-spacing:0.15em;
  padding: 0 12px; height:100%; display:flex; align-items:center;
  white-space:nowrap; flex-shrink:0;
  font-family:'Courier New',monospace;
}
.np-ticker-track {
  display:flex; align-items:center; white-space:nowrap;
  animation: ticker 50s linear infinite;
}
.np-ticker-item {
  font-family:'Courier New',monospace;
  font-size:10px; font-weight:bold; color:#000;
  padding: 0 30px;
}
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

.np-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: linear-gradient(180deg, rgba(0,229,255,0.05) 0%, transparent 100%);
  flex-shrink: 0;
}
.np-masthead {
  font-size: 2.2em; font-weight: 900; letter-spacing: 0.05em;
  color: #fff; line-height: 0.9;
  font-family: 'Courier New', monospace;
  text-transform: uppercase;
}
.np-masthead span { color: #00e5ff; }
.np-tagline { font-size: 11px; color: #6b6b80; margin-top: 6px; font-style: italic; }
.np-rule { margin-top: 10px; height: 1px; background: linear-gradient(90deg, #00e5ff, transparent); }

.np-cats {
  display:flex; gap:6px; padding:10px 16px;
  overflow-x:auto; border-bottom:1px solid rgba(255,255,255,0.06);
  scrollbar-width:none; flex-shrink:0;
}
.np-cats::-webkit-scrollbar{display:none}
.np-cat-btn {
  font-family:'Courier New',monospace; font-size:9px; font-weight:bold;
  letter-spacing:0.12em; padding:5px 12px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent; color:#6b6b80; cursor:pointer;
  white-space:nowrap; text-transform:uppercase;
  transition: all 0.2s; min-height:32px;
}
.np-cat-btn.active, .np-cat-btn:active {
  border-color:#00e5ff; color:#00e5ff; background:rgba(0,229,255,0.08);
}

.np-content { padding: 14px 16px 80px; }

/* HERO */
.np-hero {
  border:1px solid rgba(255,255,255,0.08);
  background:#0c0c10; padding:18px;
  margin-bottom:14px; position:relative; overflow:hidden;
  cursor:pointer; transition:border-color 0.3s;
}
.np-hero::before {
  content:''; position:absolute; top:0; left:0;
  width:3px; height:100%;
  background:linear-gradient(180deg,#00e5ff,#ff3d71);
}
.np-hero:active { border-color:rgba(0,229,255,0.4); }
.np-hero-label {
  font-family:'Courier New',monospace; font-size:9px; font-weight:bold;
  color:#00e5ff; letter-spacing:0.18em; text-transform:uppercase;
  margin-bottom:10px;
}
.np-hero-title { font-size:1.2em; line-height:1.25; color:#fff; margin-bottom:10px; font-weight:700; }
.np-hero-lead { font-size:12px; line-height:1.65; color:#6b6b80; }
.np-hero-footer {
  margin-top:14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.np-read-btn {
  font-family:'Courier New',monospace; font-size:10px; font-weight:bold;
  color:#00e5ff; background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.3); padding:6px 14px;
  cursor:pointer; min-height:34px;
}

/* CARD GRID */
.np-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
@media(max-width:400px){ .np-grid{grid-template-columns:1fr;} }
.np-card {
  border:1px solid rgba(255,255,255,0.07); background:#0c0c10;
  padding:14px; cursor:pointer; transition:all 0.2s; position:relative;
}
.np-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:#00e5ff; transform:scaleX(0); transform-origin:left; transition:transform 0.3s;
}
.np-card:active { border-color:rgba(0,229,255,0.25); }
.np-card:active::after { transform:scaleX(1); }
.np-card-cat {
  font-family:'Courier New',monospace; font-size:8px; font-weight:bold;
  letter-spacing:0.18em; text-transform:uppercase; margin-bottom:8px;
  padding:2px 7px; display:inline-block; border:1px solid;
}
.np-card-cat.ai { color:#00e5ff; border-color:rgba(0,229,255,0.3); }
.np-card-cat.robot { color:#ffe600; border-color:rgba(255,230,0,0.3); }
.np-card-cat.research { color:#b57bee; border-color:rgba(181,123,238,0.3); }
.np-card-cat.breaking { color:#ff3d71; border-color:rgba(255,61,113,0.3); }
.np-card-title { font-size:13px; line-height:1.3; color:#fff; margin-bottom:7px; font-weight:600; }
.np-card-excerpt { font-size:11px; line-height:1.6; color:#6b6b80; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.np-card-meta { margin-top:10px; font-family:'Courier New',monospace; font-size:8px; color:#333344; }

/* GENERATOR */
.np-gen {
  border:1px solid rgba(255,255,255,0.08); background:#0c0c10;
  padding:16px; margin-bottom:14px;
}
.np-gen-title {
  font-family:'Courier New',monospace; font-size:10px; font-weight:bold;
  color:#00e5ff; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:12px;
}
.np-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.np-pill {
  font-family:'Courier New',monospace; font-size:9px;
  padding:5px 10px; border:1px solid rgba(255,255,255,0.1);
  background:transparent; color:#6b6b80; cursor:pointer;
  transition:all 0.2s; min-height:30px;
}
.np-pill.selected { border-color:#00e5ff; color:#000; background:#00e5ff; }
.np-gen-row { display:flex; gap:8px; align-items:center; }
.np-gen-input {
  flex:1; font-family:'Courier New',monospace; font-size:13px;
  background:#050507; border:1px solid rgba(255,255,255,0.1);
  color:#e8e8f0; padding:9px 12px; outline:none; transition:border-color 0.2s;
  min-height:40px;
}
.np-gen-input:focus { border-color:#00e5ff; }
.np-gen-input::placeholder { color:#333344; }
.np-gen-btn {
  font-family:'Courier New',monospace; font-size:10px; font-weight:bold;
  letter-spacing:0.1em; padding:9px 16px;
  background:#00e5ff; color:#000; border:none;
  cursor:pointer; white-space:nowrap; min-height:40px;
}
.np-gen-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* ARTICLE */
.np-article {
  display:none; border:1px solid rgba(0,229,255,0.2); background:#0c0c10;
  padding:18px; margin-bottom:14px; position:relative;
  animation:fadeIn 0.4s ease;
}
.np-article.visible { display:block; }
.np-art-close {
  position:absolute; top:12px; right:12px;
  font-family:'Courier New',monospace; font-size:10px;
  color:#6b6b80; cursor:pointer; background:none; border:none;
  min-height:30px; min-width:30px;
}
.np-art-cat { font-family:'Courier New',monospace; font-size:9px; font-weight:bold; color:#00e5ff; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:10px; }
.np-art-title { font-size:1.15em; color:#fff; line-height:1.25; margin-bottom:14px; font-weight:700; }
.np-art-body { font-size:13px; line-height:1.8; color:#c0c0d0; }
.np-art-body p { margin-bottom:12px; }
.np-art-body strong { color:#fff; }

/* SKELETON */
.skel { height:12px; background:linear-gradient(90deg,#0c0c10,#111118,#0c0c10); background-size:200% 100%; animation:shimmer 1.5s infinite; margin-bottom:10px; border-radius:2px; }
@keyframes shimmer { from{background-position:-200% 0} to{background-position:200% 0} }

/* STATS SIDEBAR */
.np-stats {
  border:1px solid rgba(255,255,255,0.08); background:#0c0c10;
  padding:14px; margin-bottom:12px;
}
.np-stats-title {
  font-family:'Courier New',monospace; font-size:9px; font-weight:bold;
  color:#00e5ff; letter-spacing:0.18em; text-transform:uppercase;
  margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.06);
}
.np-stat-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.np-stat-label { font-family:'Courier New',monospace; font-size:9px; color:#6b6b80; }
.np-stat-val { font-size:1.3em; font-weight:900; color:#fff; font-family:'Courier New',monospace; }
.np-stat-val.c { color:#00e5ff; }
.np-stat-val.y { color:#ffe600; }
.np-stat-val.r { color:#ff3d71; }
.np-bar-label-row { display:flex; justify-content:space-between; font-family:'Courier New',monospace; font-size:8px; color:#6b6b80; margin-bottom:4px; }
.np-bar-track { height:2px; background:rgba(255,255,255,0.07); position:relative; margin-bottom:8px; }
.np-bar-fill { position:absolute; top:0; left:0; height:100%; transition:width 1s ease; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#000; }
::-webkit-scrollbar-thumb { background:var(--neon-green); border-radius:2px; }
</style>
</head>
<body>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('daemon',this)">⚡ DAEMON</button>
  <button class="tab-btn" onclick="switchTab('neural',this)">📡 NEURAL PRESS</button>
</div>

<!-- ══════════════ DAEMON SCREEN ══════════════ -->
<div class="screen active" id="screen-daemon" style="position:relative;">

  <div class="daemon-header">
    <div>
      <div class="glitch-text">DAEMON v1.2</div>
      <div style="font-size:0.6em;margin-top:2px;opacity:0.7;">AI MULTIMODALE — PUTER.JS</div>
    </div>
    <div style="text-align:right;">
      <span class="live-dot" id="live-dot" style="background:#ff0040"></span>
      <span id="status-badge" style="font-size:0.65em;color:var(--neon-cyan)">OFFLINE</span>
    </div>
  </div>

  <div class="sensor-bar">
    <span class="chip" id="cam-chip">📹 CAM</span>
    <span class="chip" id="gps-chip">📍 GPS</span>
    <span class="chip" id="motion-chip">📡 ACC</span>
    <span class="chip" id="orient-chip">🧭 MAG</span>
    <span class="chip" id="voice-chip">🔊 TTS</span>
    <span class="chip" id="net-chip">🌐 NET</span>
  </div>

  <div class="video-wrapper" id="video-wrapper">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <!-- ACTIVATION OVERLAY -->
  <div class="activation-overlay" id="activation-overlay">
    <div class="activation-box">
      <div class="glitch-text" style="font-size:1.6em;margin-bottom:8px;">DAEMON</div>
      <p style="color:var(--neon-cyan);font-size:0.85em;line-height:1.5;margin:12px 0;">
        Sistema AI Multimodale<br>
        <span style="font-size:0.85em;color:#6b6b80">Powered by Puter.js · Zero key</span>
      </p>
      <div id="protocol-info" style="font-size:0.7em;color:#555;margin-top:8px;font-family:monospace;"></div>
      <button class="activate-btn" id="activate-btn" onclick="activateDaemon()">
        ⚡ INIZIALIZZA SISTEMA
      </button>
      <div id="activation-status" style="margin-top:12px;font-size:0.75em;color:var(--neon-green);min-height:18px;"></div>
    </div>
  </div>

  <div id="chat" class="chat-container"></div>
